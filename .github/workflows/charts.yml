name: Generate temperature charts

# Validates the analysis on every push (uploading the PNGs as artifacts) and
# refreshes the committed dashboard image on a yearly schedule or on demand.

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/charts.yml"
  workflow_dispatch:
  schedule:
    # 06:00 UTC on 5 January — once the previous calendar year is complete.
    - cron: "0 6 5 1 *"

permissions:
  contents: write

jobs:
  charts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate charts
        run: python main.py

      - name: Upload chart artifacts
        uses: actions/upload-artifact@v4
        with:
          name: temperature-charts
          path: output/*.png
          if-no-files-found: error

      # Only refresh the committed image outside of push events, so the
      # commit below never re-triggers this workflow.
      - name: Refresh README dashboard image
        if: github.event_name != 'push'
        run: |
          mkdir -p assets
          cp output/warszawa_dashboard.png assets/dashboard.png
          if git diff --quiet -- assets/dashboard.png; then
            echo "Dashboard image unchanged — nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/dashboard.png
            git commit -m "Refresh dashboard chart [skip ci]"
            git push
          fi
